<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Lysardière</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header img {
      width: 80px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 2rem;
      color: #1a2e4a;
      font-weight: 700;
    }

    header p {
      color: #64748b;
      margin-top: 8px;
      font-size: 1rem;
    }

    .cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 280px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.14);
      border-color: #3b82f6;
    }

    .card .icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1.2rem;
      color: #1a2e4a;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .card p {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.5;
    }

    footer {
      margin-top: 64px;
      color: #94a3b8;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <img src="icon-192.png" alt="La Lysardière">
    <h1>La Lysardière</h1>
    <p>Espace de gestion interne</p>
  </header>

  <div class="cards">
    <a class="card" href="transport.html">
      <div class="icon">🚌</div>
      <h2>Gestion du transport</h2>
      <p>Planification des itinéraires, véhicules et semaines de transport</p>
    </a>
    <a class="card" href="documents.html">
      <div class="icon">📄</div>
      <h2>Documents d'inscription</h2>
      <p>Consultation et gestion des fiches reçues par mail</p>
    </a>
  </div>

  <footer>La Lysardière — Gestion interne</footer>

</body>
</html>
