<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#18534F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lysardière">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>La Lysardière · Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #18534F;
  --forest-mid: #226D68;
  --forest-light: #2A847E;
  --mint: #ECF8F6;
  --mint-deep: #D4EFEB;
  --gold: #FEEAA1;
  --gold-deep: #F5D96B;
  --copper: #D6955B;
  --copper-deep: #B87A45;
  --bg: #F7F3EC;
  --card: #FFFFFF;
  --text: #1A2A28;
  --text-mid: #4A5E5C;
  --text-light: #7A8E8C;
  --border: #D8E0DE;
  --border-light: #E8EEEC;
  --red: #C0392B;
  --red-bg: #FDECEA;
  --green: #1B7A4A;
  --green-bg: #E4F5EC;
  --blue: #0077A8;
  --blue-bg: #E8F4FB;
  --purple: #6B3FA0;
  --purple-bg: #F3E8FB;
  --orange: #D97706;
  --orange-bg: #FEF3C7;
  --shadow-sm: 0 1px 3px rgba(24,83,79,0.06);
  --shadow-md: 0 4px 12px rgba(24,83,79,0.08);
  --shadow-lg: 0 8px 30px rgba(24,83,79,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  padding: 0;
  padding-top: env(safe-area-inset-top);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(24,83,79,0.25);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  gap: 12px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.header-brand img {
  width: 44px; height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--gold);
}
.header-brand-text h1 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}
.header-brand-text span {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
}
.header-actions { display: flex; align-items: center; gap: 10px; }
.back-link {
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.08);
  transition: all 0.15s;
}
.back-link:hover { background: rgba(255,255,255,0.15); color: white; }

/* ── BANNERS ─────────────────────────────────── */
.alert-banner {
  background: var(--orange-bg);
  border-left: 4px solid var(--orange);
  padding: 10px 20px;
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #92400e;
  font-weight: 500;
}
.alert-banner.show { display: flex; }

.confirm-banner {
  background: var(--blue-bg);
  border-left: 4px solid var(--blue);
  padding: 10px 20px;
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--blue);
  flex-wrap: wrap;
}
.confirm-banner.show { display: flex; }

/* ── TOOLBAR ─────────────────────────────────── */
.toolbar {
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  background: var(--card);
  border-bottom: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
}
.toolbar input, .toolbar select {
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.toolbar input { width: 220px; }
.toolbar input:focus, .toolbar select:focus {
  border-color: var(--forest-mid);
  box-shadow: 0 0 0 3px rgba(34,109,104,0.1);
}

/* ── STATS BAR ───────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  flex-wrap: wrap;
  background: var(--mint);
  border-bottom: 1px solid var(--mint-deep);
}
.stat-chip {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-sm);
  font-size: 12px;
  color: var(--text-mid);
}
.stat-chip .num { font-size: 1.3rem; font-weight: 700; }
.stat-chip.ok .num    { color: var(--green); }
.stat-chip.warn .num  { color: var(--orange); }
.stat-chip.danger .num { color: var(--red); }

/* ── MAIN ────────────────────────────────────── */
.main { padding: 16px 20px; flex: 1; }

.section-title {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--forest);
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--gold);
}
.section-title .count {
  background: var(--mint-deep);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  color: var(--forest-mid);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
}

/* ── SÉJOUR BLOCKS ───────────────────────────── */
.sejour-block {
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.sejour-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  cursor: pointer;
  transition: opacity 0.15s;
}
.sejour-header:hover { opacity: 0.92; }
.sejour-header h3 {
  flex: 1;
  font-family: 'Fraunces', serif;
  font-size: 15px;
  color: var(--gold);
}
.sejour-dates { font-size: 12px; color: rgba(255,255,255,0.6); }
.sejour-count {
  background: rgba(255,255,255,0.15);
  color: white;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 600;
}
.sejour-chevron { color: rgba(255,255,255,0.5); font-size: 11px; transition: transform 0.2s; }
.sejour-chevron.open { transform: rotate(90deg); }
.sejour-body { display: none; padding: 12px 18px; background: var(--card); }
.sejour-body.open { display: block; }
.empty-sejour { color: var(--text-light); font-size: 13px; padding: 8px 0; }

/* ── PERSON CARDS ────────────────────────────── */
.person-card {
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  overflow: hidden;
}
.person-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.person-header:hover { background: var(--mint); }
.person-name { font-weight: 600; flex: 1; font-size: 13px; color: var(--text); }
.person-foyer { font-size: 11px; color: var(--text-light); }

.doc-badges { display: flex; gap: 5px; }
.badge {
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge.ok      { background: var(--green-bg); color: var(--green); }
.badge.missing { background: var(--red-bg);   color: var(--red); }

.chevron { color: var(--text-light); transition: transform 0.2s; font-size: 10px; }
.chevron.open { transform: rotate(90deg); }

.person-docs {
  display: none;
  padding: 0 14px 12px;
  border-top: 1px solid var(--border-light);
  background: var(--card);
}
.person-docs.open { display: block; }

.doc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 12px;
}
.doc-row:last-child { border-bottom: none; }
.doc-type-label { width: 120px; font-weight: 600; color: var(--text-mid); font-size: 11px; }
.doc-filename   { flex: 1; color: var(--text); }
.doc-date       { color: var(--text-light); font-size: 11px; width: 85px; }
.doc-missing    { color: var(--red); font-style: italic; flex: 1; font-size: 12px; }

/* ── BUTTONS ─────────────────────────────────── */
.btn {
  padding: 6px 14px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  background: var(--card);
  color: var(--text);
}
.btn:hover { background: var(--mint); border-color: var(--forest-mid); }
.btn-primary { background: var(--forest); color: white; border-color: var(--forest); }
.btn-primary:hover { background: var(--forest-mid); }
.btn-accent { background: var(--gold); color: var(--forest); border-color: var(--gold-deep); font-weight: 700; }
.btn-accent:hover { background: var(--gold-deep); }
.btn-success { background: var(--green-bg); color: var(--green); border-color: #b8ddb8; }
.btn-danger  { background: var(--red-bg);   color: var(--red);   border-color: #f5c6c2; }
.btn-info    { background: var(--blue-bg);  color: var(--blue);  border-color: #b8ddf0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ── UNLINKED CARDS ──────────────────────────── */
.unlinked-card {
  background: var(--card);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  font-size: 13px;
}
.unlinked-info { flex: 1; }
.unlinked-info strong { display: block; font-size: 13px; color: var(--text); }
.unlinked-info span   { color: var(--text-light); font-size: 11px; }
.link-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── MODAL ───────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(24,83,79,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
  animation: modalFadeIn 0.2s ease;
}
.modal-overlay.show { display: flex; }
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: 420px;
  width: 100%;
  overflow: hidden;
  animation: modalSlideIn 0.25s ease;
}
@keyframes modalSlideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-header-text {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
}
.modal-body { padding: 20px; }
.modal-body label {
  font-size: 11px;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
  margin-bottom: 4px;
  display: block;
}
.modal-body input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.modal-body input:focus { border-color: var(--forest-mid); }
.modal-actions {
  padding: 0 20px 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* ── MISC ────────────────────────────────────── */
.loading { text-align: center; padding: 48px; color: var(--text-light); font-size: 13px; }
.empty   { text-align: center; padding: 32px; color: var(--text-light); font-size: 13px; }

/* ── RESPONSIVE ──────────────────────────────── */
@media (max-width: 700px) {
  .toolbar input { width: 100%; }
  .main { padding: 10px 12px; }
  .doc-date { display: none; }
}
@media (max-width: 480px) {
  .header-top { padding: 10px 14px; }
  .header-brand img { width: 36px; height: 36px; }
  .header-brand-text h1 { font-size: 15px; }
  .doc-type-label { width: 90px; }
  .unlinked-card { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <a href="index.html" class="header-brand">
      <img src="icon-192.png" alt="La Lysardière">
      <div class="header-brand-text">
        <h1>La Lysardière</h1>
        <span>Documents d'inscription</span>
      </div>
    </a>
    <div class="header-actions">
      <a href="index.html" class="back-link">← Accueil</a>
      <button class="btn btn-accent btn-sm" onclick="openModal()">+ Nouveau séjour</button>
    </div>
  </div>
</div>

<!-- BANNERS -->
<div class="alert-banner" id="alertBanner">
  ⚠️ <span id="alertText"></span>
</div>
<div class="confirm-banner" id="confirmBanner"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un vacancier...">
  <select id="filterSejour">
    <option value="">Tous les séjours</option>
    <option value="none">Sans séjour</option>
  </select>
  <select id="filterStatus">
    <option value="">Tous les statuts</option>
    <option value="complete">Complets ✅</option>
    <option value="incomplete">Incomplets ⚠️</option>
    <option value="empty">Aucun document 🔴</option>
  </select>
  <select id="filterFoyer">
    <option value="">Tous les foyers</option>
  </select>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar"></div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="loading">Chargement des données…</div>
</div>

<!-- MODAL NOUVEAU SÉJOUR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span style="font-size:20px">✈️</span>
      <span class="modal-header-text">Nouveau séjour</span>
    </div>
    <div class="modal-body">
      <label>Nom du séjour</label>
      <input type="text" id="sejourNom" placeholder="Ex: Séjour été 2026">
      <label>Date de début</label>
      <input type="date" id="sejourDebut">
      <label>Date de fin</label>
      <input type="date" id="sejourFin">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSejour()">Créer le séjour</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkqzifqeniblltniabai.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrcXppZnFlbmlibGx0bmlhYmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzU0NzcsImV4cCI6MjA4OTQ1MTQ3N30.AgXx5arpHjjbAkgbIC9u6tlRUhpSMW8iNP937pNpuX4';
const REQUIRED_TYPES = ['inscription', 'confidentiel'];
const TYPE_LABELS = { inscription: '📝 Inscription', confidentiel: '🔒 Confidentiel' };

let allPersonnes = [], allDocuments = [], allSejours = [], allSejoursPersonnes = [];

async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  if (!res.ok) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function fetchData() {
  const [pRaw, docs, sejours, sp] = await Promise.all([
    api('/rest/v1/personnes?select=id,data&order=id.asc'),
    api('/rest/v1/documents?select=*&order=email_date.desc'),
    api('/rest/v1/sejours?select=*&order=date_debut.asc'),
    api('/rest/v1/sejours_personnes?select=*'),
    api('/rest/v1/sejours?archived=eq.false&select=*&order=date_debut.asc'),
    api('/rest/v1/documents?archived=eq.false&select=*&order=email_date.desc')
  ]);
  allPersonnes = (pRaw || []).map(p => ({
    id: p.id,
    prenom: p.data?.prenom || '',
    nom: p.data?.nom || '',
    foyer: p.data?.foyer || ''
  }));
  allDocuments = docs || [];
  allSejours = sejours || [];
  allSejoursPersonnes = sp || [];
}

function getPersonDocs(id)    { return allDocuments.filter(d => d.personne_id === id); }
function getUnlinked()        { return allDocuments.filter(d => !d.personne_id); }
function getMissingTypes(id)  { const t = getPersonDocs(id).map(d => d.type); return REQUIRED_TYPES.filter(x => !t.includes(x)); }
function getStatus(id) {
  const docs = getPersonDocs(id);
  if (!docs.length) return 'empty';
  // Dossier complet = un seul PDF qui contient tout
  if (docs.find(d => d.type === 'dossier_complet')) return 'complete';
  // Ou les deux types présents
  if (docs.find(d => d.type === 'inscription') && docs.find(d => d.type === 'confidentiel')) return 'complete';
  return 'incomplete';
}
function getSejourPersonnes(sid) {
  return allSejoursPersonnes.filter(sp => sp.sejour_id === sid)
    .map(sp => allPersonnes.find(p => p.id === sp.personne_id)).filter(Boolean);
}

async function getSignedUrl(path) {
  const data = await api(`/storage/v1/object/sign/documents/${path}`, 'POST', { expiresIn: 60 });
  return data ? `${SUPABASE_URL}/storage/v1${data.signedURL}` : null;
}
async function openDoc(path) {
  const url = await getSignedUrl(path);
  if (url) window.open(url, '_blank');
}

async function linkDocument(docId, personneId) {
  const p = allPersonnes.find(x => x.id === personneId);
  await api(`/rest/v1/documents?id=eq.${docId}`, 'PATCH', {
    personne_id: personneId, personne_nom: `${p.prenom} ${p.nom}`, status: 'linked'
  });
  await init();
}

async function saveSejour() {
  const nom = document.getElementById('sejourNom').value.trim();
  const debut = document.getElementById('sejourDebut').value;
  const fin = document.getElementById('sejourFin').value;
  if (!nom || !debut || !fin) return alert('Remplis tous les champs.');
  await api('/rest/v1/sejours', 'POST', { nom, date_debut: debut, date_fin: fin });
  closeModal();
  await init();
}

async function addToSejour(sid, pid) {
  await api('/rest/v1/sejours_personnes', 'POST', { sejour_id: sid, personne_id: pid, confirmed: true });
  await init();
}
async function removeFromSejour(sid, pid) {
  await api(`/rest/v1/sejours_personnes?sejour_id=eq.${sid}&personne_id=eq.${pid}`, 'DELETE');
  await init();
}
async function addPersonToSejour(sid) {
  const sel = document.getElementById(`add-sel-${sid}`);
  if (!sel.value) return;
  await addToSejour(sid, sel.value);
}
async function confirmLink(docId) {
  const sel = document.getElementById(`sel-${docId}`);
  if (!sel.value) return alert('Choisis un vacancier.');
  await linkDocument(docId, sel.value);
}
async function confirmSejour(spId) {
  await api(`/rest/v1/sejours_personnes?id=eq.${spId}`, 'PATCH', { confirmed: true });
  await init();
}
async function rejectSejour(spId) {
  await api(`/rest/v1/sejours_personnes?id=eq.${spId}`, 'DELETE');
  await init();
}

function openModal()  { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : ''; }

function buildFilters() {
  const foyers = [...new Set(allPersonnes.map(p => p.foyer).filter(Boolean))].sort();
  const selF = document.getElementById('filterFoyer');
  selF.innerHTML = '<option value="">Tous les foyers</option>';
  foyers.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; selF.appendChild(o); });

  const selS = document.getElementById('filterSejour');
  selS.innerHTML = '<option value="">Tous les séjours</option><option value="none">Sans séjour</option>';
  allSejours.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.nom} (${fmtDate(s.date_debut)})`; selS.appendChild(o); });
}

function buildStats() {
  const complets  = allPersonnes.filter(p => getStatus(p.id) === 'complete').length;
  const incomplets= allPersonnes.filter(p => getStatus(p.id) === 'incomplete').length;
  const vides     = allPersonnes.filter(p => getStatus(p.id) === 'empty').length;
  const aClasser  = getUnlinked().length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip ok"><span class="num">${complets}</span> complets</div>
    <div class="stat-chip warn"><span class="num">${incomplets}</span> incomplets</div>
    <div class="stat-chip danger"><span class="num">${vides}</span> sans document</div>
    <div class="stat-chip warn"><span class="num">${aClasser}</span> à classer</div>
    <div class="stat-chip"><span class="num">${allPersonnes.length}</span> vacanciers</div>
  `;
}

async function deleteDoc(docId, storagePath) {
  if (!confirm('Supprimer ce document définitivement ?')) return;
  await api(`/rest/v1/documents?id=eq.${docId}`, 'DELETE');
  await supabaseStorageDelete(storagePath);
  await init();
}

async function supabaseStorageDelete(path) {
  await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
    method: 'DELETE',
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
}

function checkNewDocsSinceLastVisit() {
  const lastVisit = localStorage.getItem('lysardiere_last_visit');
  const now = new Date().toISOString();
  localStorage.setItem('lysardiere_last_visit', now);

  if (!lastVisit) return; // Première visite, pas de pop-up

  const newDocs = allDocuments.filter(d => d.created_at > lastVisit);
  if (!newDocs.length) return;

  // Grouper par personne
  const byPersonne = {};
  newDocs.forEach(doc => {
    const key = doc.personne_nom || 'Non classé';
    if (!byPersonne[key]) byPersonne[key] = [];
    byPersonne[key].push(doc.filename);
  });

  const lines = Object.entries(byPersonne).map(([nom, files]) =>
    `<tr style="border-bottom:1px solid var(--border-light)">
      <td style="padding:8px 0;font-weight:600;width:180px">${nom}</td>
      <td style="padding:8px 0;color:var(--text-mid)">${files.join(', ')}</td>
    </tr>`
  ).join('');

  document.getElementById('newdocs-count').textContent = newDocs.length;
  document.getElementById('newdocs-list').innerHTML = lines;
  document.getElementById('newdocsOverlay').classList.add('show');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
}

function buildPersonCard(p, sejourId = null) {
  const docs = getPersonDocs(p.id);
  const status = getStatus(p.id);

  const badges = status === 'complete'
    ? `<span class="badge ok">✅ Dossier complet</span>`
    : REQUIRED_TYPES.map(t => {
        const has = docs.find(d => d.type === t);
        return `<span class="badge ${has ? 'ok' : 'missing'}">${TYPE_LABELS[t]}</span>`;
      }).join('');

  const docRows = REQUIRED_TYPES.map(t => {
  const typeDocs = docs.filter(d => d.type === t);
  if (typeDocs.length === 0) return `
    <div class="doc-row">
      <span class="doc-type-label">${TYPE_LABELS[t]}</span>
      <span class="doc-missing">— Document manquant</span>
    </div>`;
  return typeDocs.map(doc => `
    <div class="doc-row">
      <span class="doc-type-label">${TYPE_LABELS[t]}</span>
      <span class="doc-filename">${doc.filename}</span>
      <span class="doc-date">${fmtDate(doc.email_date)}</span>
      <button class="btn btn-info btn-sm" onclick="openDoc('${doc.storage_path}')">Voir PDF</button>
      <button class="btn btn-danger btn-sm" onclick="deleteDoc('${doc.id}', '${doc.storage_path}')">🗑️</button>
    </div>`).join('');
  }).join('');

  // Documents non classés avec sélecteur de type
  const unclassified = docs.filter(d => !REQUIRED_TYPES.includes(d.type) && d.type !== 'dossier_complet');
  const unclassifiedRows = unclassified.map(doc => `
    <div class="doc-row">
      <span class="doc-type-label" style="color:var(--orange)">📎 Non classé</span>
      <span class="doc-filename">${doc.filename}</span>
      <span class="doc-date">${fmtDate(doc.email_date)}</span>
      <button class="btn btn-info btn-sm" onclick="openDoc('${doc.storage_path}')">Voir PDF</button>
      <select class="link-select" onchange="classifyDoc('${doc.id}', this.value)">
        <option value="">— Classer comme...</option>
        <option value="inscription">📝 Inscription</option>
        <option value="confidentiel">🔒 Confidentiel</option>
        <option value="dossier_complet">📁 Dossier complet</option>
      </select>
    </div>`).join('');

  const removeBtn = sejourId
    ? `<button class="btn btn-danger btn-sm" onclick="removeFromSejour('${sejourId}','${p.id}')">Retirer</button>`
    : '';

  const uid = `${p.id}-${sejourId || 'all'}`;
  return `
    <div class="person-card">
      <div class="person-header" onclick="toggleCard('${uid}')">
        <span class="person-name">${p.prenom} ${p.nom}</span>
        <span class="person-foyer">${p.foyer}</span>
        <div class="doc-badges">${badges}</div>
        ${removeBtn}
        <span class="chevron" id="chev-${uid}">▶</span>
      </div>
      <div class="person-docs" id="docs-${uid}">
        ${docRows}
        ${unclassifiedRows}
      </div>
    </div>`;
}

async function classifyDoc(docId, type) {
  if (!type) return;
  await api(`/rest/v1/documents?id=eq.${docId}`, 'PATCH', { type, status: 'linked' });
  await init();
}

function buildSejoursSection(personnesFiltered) {
  if (!allSejours.length) return `
    <div class="section-title">✈️ Séjours</div>
    <p class="empty">Aucun séjour créé. Cliquez sur "+ Nouveau séjour".</p>`;

  const sejoursContent = allSejours.map(s => {
    const personnes = getSejourPersonnes(s.id).filter(p => personnesFiltered.some(pf => pf.id === p.id));
    const others    = personnesFiltered.filter(p => !allSejoursPersonnes.some(sp => sp.sejour_id === s.id && sp.personne_id === p.id));
    const options   = others.map(p => `<option value="${p.id}">${p.prenom} ${p.nom}</option>`).join('');
    const cards     = personnes.length ? personnes.map(p => buildPersonCard(p, s.id)).join('') : `<p class="empty-sejour">Aucun vacancier dans ce séjour.</p>`;
    const uid = `sejour-${s.id}`;

    const estPasse = new Date(s.date_fin) < new Date();
    const btnArchiver = estPasse ? `
      <button class="btn btn-archive btn-sm"
        onclick="event.stopPropagation(); archiverSejour('${s.id}')"
        title="Archiver ce séjour">
        📦 Archiver
      </button>` : '';

    return `
      <div class="sejour-block">
        <div class="sejour-header" onclick="toggleSejour('${uid}')">
          <h3>✈️ ${s.nom}</h3>
          <span class="sejour-dates">${fmtDate(s.date_debut)} → ${fmtDate(s.date_fin)}</span>
          <span class="sejour-count">${personnes.length} vacancier(s)</span>
          ${btnArchiver}
          <span class="sejour-chevron" id="schev-${uid}">▶</span>
        </div>
        <div class="sejour-body" id="${uid}">
          ${cards}
          ${options ? `
          <div style="display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap">
            <select class="link-select" id="add-sel-${s.id}">
              <option value="">+ Ajouter un vacancier</option>
              ${options}
            </select>
            <button class="btn btn-success btn-sm" onclick="addPersonToSejour('${s.id}')">Ajouter</button>
          </div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="section-title" onclick="toggleSejoursContainer()" style="cursor:pointer;user-select:none">
      ✈️ Séjours <span class="count">${allSejours.length}</span>
      <span class="chevron" id="sejours-chevron" style="margin-left:auto">▶</span>
    </div>
    <div id="sejours-container" style="display:none">
      ${sejoursContent}
    </div>`;
}

async function archiverSejour(sejourId) {
  const sejour = allSejours.find(s => s.id === sejourId);
  if (!confirm(`Archiver le séjour "${sejour.nom}" et tous ses documents ?`)) return;

  // Archiver le séjour
  await api(`/rest/v1/sejours?id=eq.${sejourId}`, 'PATCH', { archived: true });

  // Archiver tous les documents des vacanciers de ce séjour
  const personneIds = allSejoursPersonnes
    .filter(sp => sp.sejour_id === sejourId)
    .map(sp => sp.personne_id);

  for (const pid of personneIds) {
    await api(`/rest/v1/documents?personne_id=eq.${pid}`, 'PATCH', { archived: true });
  }

  await init();
}

function toggleSejoursContainer() {
  const container = document.getElementById('sejours-container');
  const chevron = document.getElementById('sejours-chevron');
  container.style.display = container.style.display === 'none' ? 'block' : 'none';
  chevron.classList.toggle('open');
}

function buildUnlinked() {
  const unlinked = getUnlinked();
  if (!unlinked.length) return '';
  const options = allPersonnes.map(p => `<option value="${p.id}">${p.prenom} ${p.nom}</option>`).join('');
  const rows = unlinked.map(doc => `
    <div class="unlinked-card">
      <span style="font-size:1.6rem">📄</span>
      <div class="unlinked-info">
        <strong>${doc.filename}</strong>
        <span>De : ${doc.email_from} — ${fmtDate(doc.email_date)}</span>
      </div>
      <button class="btn btn-info btn-sm" onclick="openDoc('${doc.storage_path}')">Voir PDF</button>
      <select class="link-select" id="sel-${doc.id}">
        <option value="">— Choisir un vacancier</option>
        ${options}
      </select>
      <button class="btn btn-success btn-sm" onclick="confirmLink('${doc.id}')">Lier</button>
    </div>`).join('');
  return `<div class="section-title">⚠️ À classer <span class="count">${unlinked.length}</span></div>${rows}`;
}

function checkAlerts() {
  const newDocs = allDocuments.filter(d => d.status === 'new');
  if (newDocs.length) {
    document.getElementById('alertText').textContent = `${newDocs.length} nouveau(x) document(s) reçu(s) et non classé(s).`;
    document.getElementById('alertBanner').classList.add('show');
  }
  const toConfirm = allSejoursPersonnes.filter(sp => sp.confirmed === false);
  if (toConfirm.length) {
    const banner = document.getElementById('confirmBanner');
    banner.classList.add('show');
    banner.innerHTML = `<span>🔵 ${toConfirm.length} liaison(s) séjour à confirmer :</span>` +
      toConfirm.map(sp => {
        const p = allPersonnes.find(x => x.id === sp.personne_id);
        const s = allSejours.find(x => x.id === sp.sejour_id);
        if (!p || !s) return '';
        return `<span><strong>${p.prenom} ${p.nom}</strong> → ${s.nom}</span>
          <button class="btn btn-info btn-sm" onclick="confirmSejour('${sp.id}')">Confirmer</button>
          <button class="btn btn-danger btn-sm" onclick="rejectSejour('${sp.id}')">Rejeter</button>`;
      }).join('');
  }
}

function toggleCard(uid) {
  document.getElementById(`docs-${uid}`)?.classList.toggle('open');
  document.getElementById(`chev-${uid}`)?.classList.toggle('open');
}
function toggleSejour(uid) {
  document.getElementById(uid)?.classList.toggle('open');
  document.getElementById(`schev-${uid}`)?.classList.toggle('open');
}

function getFilteredPersonnes() {
  const search  = document.getElementById('searchInput').value.toLowerCase();
  const fStatus = document.getElementById('filterStatus').value;
  const fFoyer  = document.getElementById('filterFoyer').value;
  const fSejour = document.getElementById('filterSejour').value;
  return allPersonnes.filter(p => {
    const name = `${p.prenom} ${p.nom}`.toLowerCase();
    if (search && !name.includes(search) && !(p.foyer||'').toLowerCase().includes(search)) return false;
    if (fStatus && getStatus(p.id) !== fStatus) return false;
    if (fFoyer  && p.foyer !== fFoyer) return false;
    if (fSejour === 'none' && allSejoursPersonnes.some(sp => sp.personne_id === p.id)) return false;
    if (fSejour && fSejour !== 'none' && !allSejoursPersonnes.some(sp => sp.sejour_id === fSejour && sp.personne_id === p.id)) return false;
    return true;
  });
}

function renderAll() {
  const personnes = getFilteredPersonnes();
  const fSejour   = document.getElementById('filterSejour').value;
  let html = buildUnlinked();
  if (!fSejour || fSejour === 'none') {
  const sejoursHtml = buildSejoursSection(personnes);
  html += sejoursHtml;}
  html += `<div class="section-title">👥 Tous les vacanciers <span class="count">${personnes.length}</span></div>`;
  html += personnes.map(p => buildPersonCard(p)).join('') || '<p class="empty">Aucun vacancier trouvé.</p>';
  document.getElementById('mainContent').innerHTML = html;
}

let listenersAdded = false;

async function init() {
  await fetchData();
  buildFilters();
  buildStats();
  checkAlerts();
  renderAll();
  checkNewDocsSinceLastVisit();

  if (!listenersAdded) {
    document.getElementById('searchInput').addEventListener('input', renderAll);
    document.getElementById('filterStatus').addEventListener('change', renderAll);
    document.getElementById('filterFoyer').addEventListener('change', renderAll);
    document.getElementById('filterSejour').addEventListener('change', renderAll);
    listenersAdded = true;
  }
}

init();
</script>

          </tr>

        <tbody id="newdocs-list"></tbody>
