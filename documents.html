<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — La Lysardière</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">← Accueil</a>
  <h1>📄 Documents d'inscription</h1>
  <button class="btn-add-sejour" onclick="openModal()">+ Nouveau séjour</button>
</header>

<div class="alert-banner" id="alertBanner">
  🔔 <span id="alertText"></span>
</div>

<div class="confirm-banner" id="confirmBanner"></div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un vacancier...">
  <select id="filterSejour">
    <option value="">Tous les séjours</option>
    <option value="none">Sans séjour</option>
  </select>
  <select id="filterStatus">
    <option value="">Tous les statuts</option>
    <option value="complete">Complets ✅</option>
    <option value="incomplete">Incomplets ⚠️</option>
    <option value="empty">Aucun document 🔴</option>
  </select>
  <select id="filterFoyer">
    <option value="">Tous les foyers</option>
  </select>
</div>

<div class="stats" id="statsBar"></div>
<div class="main" id="mainContent"><div class="loading">Chargement...</div></div>

<!-- Modal nouveau séjour -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✈️ Nouveau séjour</h2>
    <label>Nom du séjour</label>
    <input type="text" id="sejourNom" placeholder="Ex: Séjour été 2026">
    <label>Date de début</label>
    <input type="date" id="sejourDebut">
    <label>Date de fin</label>
    <input type="date" id="sejourFin">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveSejour()">Créer</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkqzifqeniblltniabai.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrcXppZnFlbmlibGx0bmlhYmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzU0NzcsImV4cCI6MjA4OTQ1MTQ3N30.AgXx5arpHjjbAkgbIC9u6tlRUhpSMW8iNP937pNpuX4';
const REQUIRED_TYPES = ['inscription', 'medical', 'confidentiel'];
const TYPE_LABELS = { inscription: '📝 Inscription', medical: '🏥 Médical', confidentiel: '🔒 Confidentiel' };

let allPersonnes = [], allDocuments = [], allSejours = [], allSejoursPersonnes = [];

async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  if (!res.ok) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function fetchData() {
  const [pRaw, docs, sejours, sp] = await Promise.all([
    api('/rest/v1/personnes?select=id,data&order=id.asc'),
    api('/rest/v1/documents?select=*&order=email_date.desc'),
    api('/rest/v1/sejours?select=*&order=date_debut.asc'),
    api('/rest/v1/sejours_personnes?select=*')
  ]);

  allPersonnes = (pRaw || []).map(p => ({
    id: p.id,
    prenom: p.data?.prenom || '',
    nom: p.data?.nom || '',
    foyer: p.data?.foyer || ''
  }));
  allDocuments = docs || [];
  allSejours = sejours || [];
  allSejoursPersonnes = sp || [];
}

function getPersonDocs(personneId) {
  return allDocuments.filter(d => d.personne_id === personneId);
}

function getUnlinked() {
  return allDocuments.filter(d => !d.personne_id);
}

function getMissingTypes(personneId) {
  const types = getPersonDocs(personneId).map(d => d.type);
  return REQUIRED_TYPES.filter(t => !types.includes(t));
}

function getStatus(personneId) {
  const docs = getPersonDocs(personneId);
  if (docs.length === 0) return 'empty';
  if (getMissingTypes(personneId).length === 0) return 'complete';
  return 'incomplete';
}

function getPersonSejours(personneId) {
  return allSejoursPersonnes.filter(sp => sp.personne_id === personneId);
}

function getSejourPersonnes(sejourId) {
  return allSejoursPersonnes
    .filter(sp => sp.sejour_id === sejourId)
    .map(sp => allPersonnes.find(p => p.id === sp.personne_id))
    .filter(Boolean);
}

async function getSignedUrl(path) {
  const data = await api(`/storage/v1/object/sign/documents/${path}`, 'POST', { expiresIn: 60 });
  return data ? `${SUPABASE_URL}/storage/v1${data.signedURL}` : null;
}

async function openDoc(path) {
  const url = await getSignedUrl(path);
  if (url) window.open(url, '_blank');
}

async function linkDocument(docId, personneId) {
  const p = allPersonnes.find(x => x.id === personneId);
  await api(`/rest/v1/documents?id=eq.${docId}`, 'PATCH', {
    personne_id: personneId,
    personne_nom: `${p.prenom} ${p.nom}`,
    status: 'linked'
  });
  await init();
}

async function saveSejour() {
  const nom = document.getElementById('sejourNom').value.trim();
  const debut = document.getElementById('sejourDebut').value;
  const fin = document.getElementById('sejourFin').value;
  if (!nom || !debut || !fin) return alert('Remplis tous les champs.');
  await api('/rest/v1/sejours', 'POST', { nom, date_debut: debut, date_fin: fin });
  closeModal();
  await init();
}

async function addToSejour(sejourId, personneId) {
  await api('/rest/v1/sejours_personnes', 'POST', {
    sejour_id: sejourId, personne_id: personneId, confirmed: true
  });
  await init();
}

async function removeFromSejour(sejourId, personneId) {
  await api(`/rest/v1/sejours_personnes?sejour_id=eq.${sejourId}&personne_id=eq.${personneId}`, 'DELETE');
  await init();
}

function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function buildFilters() {
  const foyers = [...new Set(allPersonnes.map(p => p.foyer).filter(Boolean))].sort();
  const selFoyer = document.getElementById('filterFoyer');
  selFoyer.innerHTML = '<option value="">Tous les foyers</option>';
  foyers.forEach(f => {
    const o = document.createElement('option'); o.value = f; o.textContent = f;
    selFoyer.appendChild(o);
  });

  const selSejour = document.getElementById('filterSejour');
  selSejour.innerHTML = '<option value="">Tous les séjours</option><option value="none">Sans séjour</option>';
  allSejours.forEach(s => {
    const o = document.createElement('option'); o.value = s.id;
    o.textContent = `${s.nom} (${fmtDate(s.date_debut)})`;
    selSejour.appendChild(o);
  });
}

function buildStats() {
  const complets = allPersonnes.filter(p => getStatus(p.id) === 'complete').length;
  const incomplets = allPersonnes.filter(p => getStatus(p.id) === 'incomplete').length;
  const vides = allPersonnes.filter(p => getStatus(p.id) === 'empty').length;
  const aClasser = getUnlinked().length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card ok"><span class="num">${complets}</span> complets</div>
    <div class="stat-card warning"><span class="num">${incomplets}</span> incomplets</div>
    <div class="stat-card danger"><span class="num">${vides}</span> sans document</div>
    <div class="stat-card warning"><span class="num">${aClasser}</span> à classer</div>
    <div class="stat-card"><span class="num">${allPersonnes.length}</span> vacanciers</div>
  `;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR');
}

function buildPersonCard(p, sejourId = null) {
  const docs = getPersonDocs(p.id);
  const badges = REQUIRED_TYPES.map(t => {
    const has = docs.find(d => d.type === t);
    return `<span class="badge ${has ? 'ok' : 'missing'}">${TYPE_LABELS[t]}</span>`;
  }).join('');

  const docRows = REQUIRED_TYPES.map(t => {
    const doc = docs.find(d => d.type === t);
    if (doc) return `
      <div class="doc-row">
        <span class="doc-type-label">${TYPE_LABELS[t]}</span>
        <span class="doc-filename">${doc.filename}</span>
        <span class="doc-date">${fmtDate(doc.email_date)}</span>
        <button class="btn-view" onclick="openDoc('${doc.storage_path}')">Voir PDF</button>
      </div>`;
    return `
      <div class="doc-row">
        <span class="doc-type-label">${TYPE_LABELS[t]}</span>
        <span class="doc-missing">— Document manquant</span>
      </div>`;
  }).join('');

  const removeBtn = sejourId
    ? `<button class="btn-view" style="background:#ef4444" onclick="removeFromSejour('${sejourId}','${p.id}')">Retirer</button>`
    : '';

  const uid = `${p.id}-${sejourId || 'all'}`;
  return `
    <div class="person-card">
      <div class="person-header" onclick="toggleCard('${uid}')">
        <span class="person-name">${p.prenom} ${p.nom}</span>
        <span class="person-foyer">${p.foyer}</span>
        <div class="doc-badges">${badges}</div>
        ${removeBtn}
        <span class="chevron" id="chev-${uid}">▶</span>
      </div>
      <div class="person-docs" id="docs-${uid}">${docRows}</div>
    </div>`;
}

function buildSejoursSection(personnesFiltered) {
  if (allSejours.length === 0) return `
    <div class="section-title">✈️ Séjours</div>
    <p style="color:#94a3b8;font-size:0.9rem;padding:12px 0">Aucun séjour créé. Cliquez sur "+ Nouveau séjour".</p>`;

  return allSejours.map(s => {
    const personnes = getSejourPersonnes(s.id)
      .filter(p => personnesFiltered.some(pf => pf.id === p.id));

    const otherPersonnes = personnesFiltered.filter(p =>
      !allSejoursPersonnes.some(sp => sp.sejour_id === s.id && sp.personne_id === p.id)
    );

    const options = otherPersonnes.map(p =>
      `<option value="${p.id}">${p.prenom} ${p.nom}</option>`
    ).join('');

    const cards = personnes.length > 0
      ? personnes.map(p => buildPersonCard(p, s.id)).join('')
      : `<p class="empty-sejour">Aucun vacancier dans ce séjour.</p>`;

    return `
      <div class="sejour-block">
        <div class="sejour-header" onclick="toggleSejour('sejour-${s.id}')">
          <h3>✈️ ${s.nom}</h3>
          <span class="sejour-dates">${fmtDate(s.date_debut)} → ${fmtDate(s.date_fin)}</span>
          <span class="count" style="background:rgba(255,255,255,0.2);color:white;border-radius:20px;padding:2px 10px;font-size:0.8rem;margin-left:8px">${personnes.length} vacancier(s)</span>
          <span style="color:#94a3b8;margin-left:8px">▶</span>
        </div>
        <div id="sejour-${s.id}" style="display:none">
          <div class="sejour-body">
            ${cards}
            ${options ? `
            <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
              <select class="link-select" id="add-sel-${s.id}">
                <option value="">+ Ajouter un vacancier</option>
                ${options}
              </select>
              <button class="btn-confirm" onclick="addPersonToSejour('${s.id}')">Ajouter</button>
            </div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function addPersonToSejour(sejourId) {
  const sel = document.getElementById(`add-sel-${sejourId}`);
  if (!sel.value) return;
  await addToSejour(sejourId, sel.value);
}

function buildUnlinked() {
  const unlinked = getUnlinked();
  if (unlinked.length === 0) return '';
  const options = allPersonnes.map(p =>
    `<option value="${p.id}">${p.prenom} ${p.nom}</option>`
  ).join('');
  const rows = unlinked.map(doc => `
    <div class="unlinked-card">
      <span style="font-size:1.5rem">📄</span>
      <div class="unlinked-info">
        <strong>${doc.filename}</strong>
        <span>De : ${doc.email_from} — ${fmtDate(doc.email_date)}</span>
      </div>
      <button class="btn-view" onclick="openDoc('${doc.storage_path}')">Voir PDF</button>
      <select class="link-select" id="sel-${doc.id}">
        <option value="">— Choisir un vacancier</option>
        ${options}
      </select>
      <button class="btn-confirm" onclick="confirmLink('${doc.id}')">Lier</button>
    </div>`).join('');
  return `<div class="section-title">⚠️ À classer <span class="count">${unlinked.length}</span></div>${rows}`;
}

async function confirmLink(docId) {
  const sel = document.getElementById(`sel-${docId}`);
  if (!sel.value) return alert('Choisis un vacancier.');
  await linkDocument(docId, sel.value);
}

function checkAlerts() {
  const newDocs = allDocuments.filter(d => d.status === 'new');
  if (newDocs.length > 0) {
    document.getElementById('alertText').textContent =
      `${newDocs.length} nouveau(x) document(s) reçu(s) et non classé(s).`;
    document.getElementById('alertBanner').classList.add('show');
  }

  // Liaisons séjour à confirmer
  const toConfirm = allSejoursPersonnes.filter(sp => sp.confirmed === false);
  if (toConfirm.length > 0) {
    const banner = document.getElementById('confirmBanner');
    banner.classList.add('show');
    banner.innerHTML = `<span>🔵 ${toConfirm.length} liaison(s) séjour à confirmer :</span>` +
      toConfirm.map(sp => {
        const p = allPersonnes.find(x => x.id === sp.personne_id);
        const s = allSejours.find(x => x.id === sp.sejour_id);
        if (!p || !s) return '';
        return `
          <span><strong>${p.prenom} ${p.nom}</strong> → ${s.nom}</span>
          <button class="btn-confirm-small" onclick="confirmSejour('${sp.id}')">Confirmer</button>
          <button class="btn-reject-small" onclick="rejectSejour('${sp.id}')">Rejeter</button>`;
      }).join('');
  }
}

async function confirmSejour(spId) {
  await api(`/rest/v1/sejours_personnes?id=eq.${spId}`, 'PATCH', { confirmed: true });
  await init();
}

async function rejectSejour(spId) {
  await api(`/rest/v1/sejours_personnes?id=eq.${spId}`, 'DELETE');
  await init();
}

function toggleCard(uid) {
  document.getElementById(`docs-${uid}`)?.classList.toggle('open');
  document.getElementById(`chev-${uid}`)?.classList.toggle('open');
}

function toggleSejour(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function getFilteredPersonnes() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filterStatus = document.getElementById('filterStatus').value;
  const filterFoyer = document.getElementById('filterFoyer').value;
  const filterSejour = document.getElementById('filterSejour').value;

  return allPersonnes.filter(p => {
    const name = `${p.prenom} ${p.nom}`.toLowerCase();
    if (search && !name.includes(search) && !(p.foyer||'').toLowerCase().includes(search)) return false;
    if (filterStatus && getStatus(p.id) !== filterStatus) return false;
    if (filterFoyer && p.foyer !== filterFoyer) return false;
    if (filterSejour === 'none' && allSejoursPersonnes.some(sp => sp.personne_id === p.id)) return false;
    if (filterSejour && filterSejour !== 'none' && !allSejoursPersonnes.some(sp => sp.sejour_id === filterSejour && sp.personne_id === p.id)) return false;
    return true;
  });
}

function renderAll() {
  const personnes = getFilteredPersonnes();
  const filterSejour = document.getElementById('filterSejour').value;

  let html = buildUnlinked();

  if (!filterSejour || filterSejour === 'none') {
    html += buildSejoursSection(personnes);
  }

  html += `<div class="section-title">👥 Tous les vacanciers <span class="count">${personnes.length}</span></div>`;
  html += personnes.map(p => buildPersonCard(p)).join('');

  document.getElementById('mainContent').innerHTML = html;
}

async function init() {
  await fetchData();
  buildFilters();
  buildStats();
  checkAlerts();
  renderAll();

  document.getElementById('searchInput').addEventListener('input', renderAll);
  document.getElementById('filterStatus').addEventListener('change', renderAll);
  document.getElementById('filterFoyer').addEventListener('change', renderAll);
  document.getElementById('filterSejour').addEventListener('change', renderAll);
}

init();
</script>
</body>
</html>
