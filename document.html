<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#18534F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lysardière">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>La Lysardière · Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root {
  --forest:       #18534F;
  --forest-mid:   #226D68;
  --forest-light: #2A847E;
  --mint:         #ECF8F6;
  --mint-deep:    #D4EFEB;
  --gold:         #FEEAA1;
  --gold-deep:    #F5D96B;
  --bg:           #F7F3EC;
  --card:         #FFFFFF;
  --text:         #1A2A28;
  --text-mid:     #4A5E5C;
  --text-light:   #7A8E8C;
  --border:       #D8E0DE;
  --border-light: #E8EEEC;
  --red:          #C0392B;
  --red-bg:       #FDECEA;
  --green:        #1B7A4A;
  --green-bg:     #E4F5EC;
  --blue:         #0077A8;
  --blue-bg:      #E8F4FB;
  --purple:       #6B3FA0;
  --purple-bg:    #F3E8FB;
  --orange:       #D97706;
  --orange-bg:    #FEF3C7;
  --shadow-sm:    0 1px 3px rgba(24,83,79,0.06);
  --shadow-md:    0 4px 16px rgba(24,83,79,0.10);
  --shadow-lg:    0 8px 32px rgba(24,83,79,0.14);
  --radius:       16px;
  --radius-sm:    10px;
  --radius-xs:    7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  padding-top: env(safe-area-inset-top);
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 24px rgba(24,83,79,0.28);
}
.header-top {
  display: flex; align-items: center;
  padding: 10px 20px; gap: 12px; min-height: 60px;
}
.header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
.header-brand img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
.header-brand-text h1 { font-family: 'Fraunces', serif; font-size: 17px; color: var(--gold); line-height: 1.2; }
.header-brand-text span { display: block; font-size: 9px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; }
.header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.back-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: var(--radius-xs); background: rgba(255,255,255,0.08); transition: all 0.15s; white-space: nowrap; }
.back-link:hover { background: rgba(255,255,255,0.16); color: white; }

/* BANNERS */
.alert-banner { background: var(--orange-bg); border-left: 4px solid var(--orange); padding: 10px 20px; display: none; align-items: center; gap: 10px; font-size: 13px; color: #92400e; font-weight: 500; }
.alert-banner.show { display: flex; }
.confirm-banner { background: var(--blue-bg); border-left: 4px solid var(--blue); padding: 10px 20px; display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--blue); flex-wrap: wrap; }
.confirm-banner.show { display: flex; }

/* TOOLBAR */
.toolbar { background: var(--card); border-bottom: 1px solid var(--border-light); padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; box-shadow: var(--shadow-sm); }
.toolbar input, .toolbar select { border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 7px 11px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, box-shadow 0.2s; height: 34px; }
.toolbar input { min-width: 200px; flex: 1; max-width: 260px; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--forest-mid); box-shadow: 0 0 0 3px rgba(34,109,104,0.1); }

/* STATS */
.stats-bar { display: flex; gap: 8px; padding: 12px 20px; flex-wrap: wrap; background: linear-gradient(to right, var(--mint), #f0faf8); border-bottom: 1px solid var(--mint-deep); }
.stat-chip { background: var(--card); border: 1px solid var(--border-light); border-radius: 30px; padding: 5px 14px; display: flex; align-items: center; gap: 7px; box-shadow: var(--shadow-sm); font-size: 12px; color: var(--text-mid); white-space: nowrap; }
.stat-chip .num { font-size: 1.1rem; font-weight: 700; font-family: 'Fraunces', serif; }
.stat-chip.ok .num { color: var(--green); }
.stat-chip.warn .num { color: var(--orange); }
.stat-chip.danger .num { color: var(--red); }

/* MAIN */
.main { padding: 20px; flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; }

/* SECTION TITLES */
.section-title { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: var(--forest); margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 2px solid var(--gold-deep); }
.section-title .count { background: var(--mint-deep); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--forest-mid); font-family: 'DM Sans', sans-serif; font-weight: 600; }

/* SÉJOUR BLOCKS */
.sejour-block { border: 1px solid var(--border-light); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
.sejour-block:hover { box-shadow: var(--shadow-md); }
.sejour-header { padding: 13px 18px; display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%); cursor: pointer; user-select: none; }
.sejour-header h3 { flex: 1; font-family: 'Fraunces', serif; font-size: 14px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sejour-dates { font-size: 11px; color: rgba(255,255,255,0.55); white-space: nowrap; flex-shrink: 0; }
.sejour-count { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
.sejour-chevron { color: rgba(255,255,255,0.45); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.sejour-chevron.open { transform: rotate(90deg); }
.sejour-body { display: none; padding: 14px 18px; background: var(--card); }
.sejour-body.open { display: block; }
.empty-sejour { color: var(--text-light); font-size: 13px; padding: 6px 0; }
.cat-header { font-family: 'Fraunces', serif; font-size: 13px; font-weight: 600; color: var(--forest); margin: 10px 0 8px; display: flex; align-items: center; gap: 7px; padding-bottom: 6px; border-bottom: 1px dashed var(--mint-deep); cursor: pointer; user-select: none; }

/* PERSON CARDS */
.person-card { background: var(--bg); border: 1px solid var(--border-light); border-radius: var(--radius-sm); margin-bottom: 6px; overflow: hidden; transition: box-shadow 0.15s; }
.person-card:hover { box-shadow: var(--shadow-sm); }
.person-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
.person-header:hover { background: var(--mint); }
.person-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--forest-light), var(--forest-mid)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.person-foyer { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.missing { background: var(--red-bg); color: var(--red); }
.badge-inscription { background: #d1fae5; color: #065f46; }
.badge-confidentiel { background: #f3e8fb; color: #6b3fa0; }
.badge-ordonnance { background: #dbeafe; color: #1e40af; }
.badge-divers { background: #fce7f3; color: #9d174d; }
.badge-pending { background: var(--orange-bg); color: var(--orange); }
.chevron { color: var(--text-light); transition: transform 0.2s; font-size: 10px; flex-shrink: 0; }
.chevron.open { transform: rotate(90deg); }
.person-docs { display: none; padding: 0 14px 12px 56px; border-top: 1px solid var(--border-light); background: var(--card); }
.person-docs.open { display: block; }

/* DOC ROWS */
.doc-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-light); font-size: 12px; flex-wrap: wrap; }
.doc-row:last-child { border-bottom: none; }
.doc-type-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.doc-type-pill.inscription { background: #d1fae5; color: #065f46; }
.doc-type-pill.confidentiel { background: #f3e8fb; color: #6b3fa0; }
.doc-type-pill.ordonnance { background: #dbeafe; color: #1e40af; }
.doc-type-pill.divers { background: #fce7f3; color: #9d174d; }
.doc-type-pill.missing { background: var(--bg); color: var(--text-light); border: 1px dashed var(--border); }
.doc-type-pill.nonclasse { background: var(--orange-bg); color: var(--orange); }
.doc-filename { flex: 1; color: var(--text); font-size: 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-date { color: var(--text-light); font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.doc-missing { color: var(--text-light); font-style: italic; font-size: 12px; }
.doc-actions { display: flex; gap: 5px; flex-shrink: 0; }
.valider-block { padding: 10px 0 2px; border-top: 1px solid var(--border-light); margin-top: 6px; }

/* À CLASSER */
.unlinked-card { background: var(--card); border: 1px solid #fde68a; border-left: 4px solid var(--orange); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: grid; grid-template-columns: auto 1fr; gap: 10px 14px; box-shadow: var(--shadow-sm); align-items: start; }
.unlinked-icon { font-size: 1.4rem; padding-top: 2px; }
.unlinked-info { min-width: 0; }
.unlinked-info strong { display: block; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.unlinked-meta { color: var(--text-light); font-size: 11px; margin-top: 2px; }
.unlinked-actions { grid-column: 2; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* SEARCH SELECT */
.search-select { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
.search-select-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; height: 32px; transition: border-color 0.2s; }
.search-select-input:focus { border-color: var(--forest-mid); box-shadow: 0 0 0 2px rgba(34,109,104,0.1); }
.search-select-list { display: none; position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xs); max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: var(--shadow-md); }
.search-select-item { padding: 7px 12px; font-size: 12px; cursor: pointer; color: var(--text); border-bottom: 1px solid var(--border-light); }
.search-select-item:last-child { border-bottom: none; }
.search-select-item:hover { background: var(--mint); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--radius-xs); border: 1px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; transition: all 0.15s; background: var(--card); color: var(--text); white-space: nowrap; text-decoration: none; }
.btn:hover { background: var(--mint); border-color: var(--forest-mid); }
.btn-primary { background: var(--forest); color: white; border-color: var(--forest); }
.btn-primary:hover { background: var(--forest-mid); }
.btn-accent { background: var(--gold); color: var(--forest); border-color: var(--gold-deep); font-weight: 700; }
.btn-accent:hover { background: var(--gold-deep); }
.btn-success { background: var(--green-bg); color: var(--green); border-color: #b8ddb8; }
.btn-success:hover { background: #c8ecd8; }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: #f5c6c2; }
.btn-danger:hover { background: #fbd5d1; }
.btn-info { background: var(--blue-bg); color: var(--blue); border-color: #b8ddf0; }
.btn-info:hover { background: #d0e9f8; }
.btn-archive { background: var(--purple-bg); color: var(--purple); border-color: #d8b8f0; }
.btn-archive:hover { background: #e8d0f8; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-icon { padding: 4px 7px; }
.link-select { padding: 5px 9px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 30px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(24,83,79,0.50); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; animation: fadeIn 0.2s ease; }
.modal-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 440px; width: 100%; overflow: hidden; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { padding: 16px 20px; background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%); display: flex; align-items: center; gap: 10px; }
.modal-header-text { font-family: 'Fraunces', serif; font-size: 15px; color: var(--gold); }
.modal-body { padding: 20px; }
.modal-body label { display: block; font-size: 10px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 4px; }
.modal-body input, .modal-body select { display: block; width: 100%; border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 9px 12px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; font-family: 'DM Sans', sans-serif; margin-bottom: 14px; transition: border-color 0.2s; }
.modal-body input:focus, .modal-body select:focus { border-color: var(--forest-mid); box-shadow: 0 0 0 3px rgba(34,109,104,0.1); }
.modal-actions { padding: 0 20px 16px; display: flex; gap: 8px; justify-content: flex-end; }

/* PDF PREVIEW */
.pdf-preview-overlay { position: fixed; inset: 0; background: rgba(10,30,28,0.80); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9998; padding: 16px; }
.pdf-preview-overlay.show { display: flex; }
.pdf-preview-box { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: min(92vw, 960px); height: min(90vh, 860px); display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.2s ease; }
.pdf-preview-header { padding: 12px 18px; background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.pdf-preview-title { font-family: 'Fraunces', serif; color: var(--gold); font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pdf-preview-iframe { flex: 1; border: none; width: 100%; display: block; }
.pdf-preview-actions { padding: 10px 18px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border-light); background: var(--bg); flex-shrink: 0; }

/* MISC */
.loading { text-align: center; padding: 56px; color: var(--text-light); font-size: 13px; }
.empty { text-align: center; padding: 32px; color: var(--text-light); font-size: 13px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .main { padding: 14px; }
  .toolbar { gap: 6px; }
  .toolbar input { min-width: 0; flex: 1; max-width: none; }
  .toolbar select { flex: 1; min-width: 0; }
  .header-brand-text span { display: none; }
  .stats-bar { padding: 10px 14px; gap: 6px; }
  .sejour-dates { display: none; }
  .unlinked-card { grid-template-columns: 1fr; }
  .unlinked-icon { display: none; }
  .unlinked-actions { flex-wrap: wrap; }
  .search-select { max-width: none; width: 100%; }
}
@media (max-width: 480px) {
  .header-top { padding: 8px 14px; }
  .header-brand img { width: 34px; height: 34px; }
  .header-brand-text h1 { font-size: 15px; }
  .doc-date { display: none; }
  .person-docs { padding-left: 14px; }
  .person-avatar { display: none; }
  .main { padding: 10px; }
  .btn-sm { padding: 3px 8px; font-size: 10px; }
}
@media (min-width: 1100px) {
  .main { padding: 24px 28px; }
  .stats-bar { padding: 12px 28px; }
  .toolbar { padding: 10px 28px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a href="index.html" class="header-brand">
      <img src="icon-192.png" alt="La Lysardière">
      <div class="header-brand-text">
        <h1>La Lysardière</h1>
        <span>Documents d'inscription</span>
      </div>
    </a>
    <div class="header-actions">
      <a href="index.html" class="back-link">← Accueil</a>
      <button class="btn btn-sm" onclick="openSejoursConfig()" title="Configurer les séjours du formulaire public">⚙️ Séjours formulaire</button>
      <button class="btn btn-sm" onclick="openLienFormulaireModal()" title="Générer un lien à envoyer aux structures" style="background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc">🔗 Lien formulaire</button>
      <button class="btn btn-accent btn-sm" onclick="openModal()">+ Séjour</button>
      <button class="btn btn-accent btn-sm" onclick="openAddDocModal()">+ Document</button>
      <button class="btn btn-accent btn-sm" onclick="openAddPersonModal()">+ Vacancier</button>
    </div>
  </div>
</div>

<div class="alert-banner" id="alertBanner">⚠️ <span id="alertText"></span></div>
<div class="confirm-banner" id="confirmBanner"></div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un vacancier…">
  <select id="filterSejour">
    <option value="">Tous les séjours</option>
    <option value="none">Sans séjour</option>
  </select>
  <select id="filterStatus">
    <option value="">Tous les statuts</option>
    <option value="complete">Complets ✅</option>
    <option value="pending">À vérifier ⏳</option>
    <option value="incomplete">Incomplets ⚠️</option>
    <option value="empty">Sans document 🔴</option>
  </select>
  <select id="filterFoyer">
    <option value="">Tous les foyers</option>
  </select>
  <select id="filterFiche" onchange="renderAll()">
    <option value="">Toutes les fiches</option>
    <option value="avec_fiche">Avec fiche reçue 📋</option>
    <option value="sans_fiche">Sans fiche reçue</option>
    <option value="inscription">Fiche inscription 📝</option>
    <option value="confidentiel">Fiche confidentielle 🔒</option>
    <option value="complet">Dossier complet 📋</option>
  </select>
  <select id="sortPersonnes" onchange="renderAll()">
    <option value="alpha">A → Z</option>
    <option value="foyer">Par foyer</option>
  </select>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="main" id="mainContent"><div class="loading">Chargement des données…</div></div>

<!-- MODAL SÉJOUR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span style="font-size:18px">✈️</span>
      <span class="modal-header-text">Nouveau séjour</span>
    </div>
    <div class="modal-body">
      <label>Nom du séjour</label>
      <input type="text" id="sejourNom" placeholder="Ex: Séjour été 2026">
      <label>Date de début</label>
      <input type="date" id="sejourDebut">
      <label>Date de fin</label>
      <input type="date" id="sejourFin">
      <label>Catégorie</label>
      <select id="sejourCategorie">
        <option value="weekend">🏕️ Week-end</option>
        <option value="mini_sejour">⛺ Mini séjour</option>
        <option value="semaine">🌊 Semaine</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSejour()">Créer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://lkqzifqeniblltniabai.supabase.co';

const REQUIRED_TYPES = ['inscription', 'confidentiel'];
const TYPE_LABELS = { inscription:'📝 Inscription', confidentiel:'🔒 Confidentiel', ordonnance:'💊 Ordonnance', divers:'📎 Divers', dossier_complet:'📁 Dossier complet' };

let allPersonnes=[], allDocuments=[], allSejours=[], allSejoursPersonnes=[], allArchivedSejours=[], allFiches=[];

function esc(str) { return (str||'').replace(/'/g, "\\'"); }

async function getJWT(){
  try{
    const {data:{session}}=await window._supaClient.auth.getSession();
    if(session&&session.access_token) return session.access_token;
  }catch(e){}
  return SUPABASE_ANON_KEY;
}

async function api(path, method='GET', body=null) {
  const jwt = await getJWT();
  const opts = { method, headers: { apikey: SUPABASE_ANON_KEY, Authorization:`Bearer ${jwt}`, 'Content-Type':'application/json', Prefer:'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  if (!res.ok) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── AUTH ──────────────────────────────────
window._supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth:{persistSession:true,storageKey:'lys_session',storage:localStorage,autoRefreshToken:true}
});

async function fetchData() {
  const [pRaw, docs, sejours, sp, archivedSejours, fiches] = await Promise.all([
    api('/rest/v1/personnes?select=id,data&order=id.asc'),
    api('/rest/v1/documents?select=*&order=email_date.desc'),
    api('/rest/v1/sejours?archived=eq.false&select=*&order=date_debut.asc'),
    api('/rest/v1/sejours_personnes?select=*'),
    api('/rest/v1/sejours?archived=eq.true&select=*&order=date_debut.desc'),
    api('/rest/v1/fiches_inscription?select=*&order=soumis_le.desc')
  ]);
  allPersonnes = (pRaw||[]).map(p => ({ id:p.id, prenom:p.data?.prenom||'', nom:p.data?.nom||'', foyer:p.data?.foyer||'' }));
  allDocuments = docs||[];
  allSejours = sejours||[];
  allSejoursPersonnes = sp||[];
  allArchivedSejours = archivedSejours||[];
  allFiches = fiches||[];
}

function buildArchivesSection() {
  if (!allArchivedSejours.length) return '';

  // Grouper par année
  const byAnnee = {};
  allArchivedSejours.forEach(s => {
    const annee = s.annee || new Date(s.date_debut).getFullYear();
    if (!byAnnee[annee]) byAnnee[annee] = [];
    byAnnee[annee].push(s);
  });

  const anneesHtml = Object.entries(byAnnee).sort((a,b) => b[0]-a[0]).map(([annee, sejours]) => {
    const sejoursHtml = sejours.map(s => {
      const personnes = allSejoursPersonnes
        .filter(sp => sp.sejour_id === s.id)
        .map(sp => allPersonnes.find(p => p.id === sp.personne_id))
        .filter(Boolean);

      const cardsHtml = personnes.map(p => {
        const docs = allDocuments.filter(d => d.personne_id === p.id);
        const docsHtml = docs.map(doc => `
          <div class="doc-row">
            <span class="doc-type-pill ${doc.type==='confidentiel'?'confidentiel':doc.type==='inscription'?'inscription':doc.type==='ordonnance'?'ordonnance':'divers'}">${TYPE_LABELS[doc.type]||doc.type}</span>
            <span class="doc-filename">${doc.filename}</span>
            <span class="doc-date">${fmtDate(doc.email_date)}</span>
            <div class="doc-actions">
              <button class="btn btn-info btn-sm" onclick="openDoc('${esc(doc.storage_path)}','${esc(doc.filename)}')">Voir</button>
            </div>
          </div>`).join('') || '<p class="empty-sejour">Aucun document.</p>';

        const uid = `arch-${p.id}-${s.id}`;
        return `
          <div class="person-card">
            <div class="person-header" onclick="toggleCard('${uid}')">
              <div class="person-avatar">${initials(p.prenom,p.nom)}</div>
              <div class="person-info">
                <div class="person-name">${p.prenom} ${p.nom}</div>
                <div class="person-foyer">${p.foyer}</div>
              </div>
              <span style="font-size:11px;color:var(--text-light)">${docs.length} doc${docs.length>1?'s':''}</span>
              <span class="chevron" id="chev-${uid}">▶</span>
            </div>
            <div class="person-docs" id="docs-${uid}">${docsHtml}</div>
          </div>`;
      }).join('') || '<p class="empty-sejour">Aucun vacancier.</p>';

      const uid = `arch-sejour-${s.id}`;
      return `
        <div class="sejour-block" style="opacity:0.85">
          <div class="sejour-header" onclick="toggleSejour('${uid}')" style="background:linear-gradient(135deg,#4a5e5c,#6a7e7c)">
            <h3>${s.nom}</h3>
            <span class="sejour-dates">${fmtDate(s.date_debut)} → ${fmtDate(s.date_fin)}</span>
            <span class="sejour-count">${personnes.length} vacancier(s)</span>
            <span class="sejour-chevron" id="schev-${uid}">▶</span>
          </div>
          <div class="sejour-body" id="${uid}">${cardsHtml}</div>
        </div>`;
    }).join('');

    return `
      <div style="margin-bottom:8px">
        <div class="cat-header" onclick="toggleCat('arch-${annee}','chev-arch-${annee}')">
          📦 ${annee} <span class="count">${sejours.length} séjour(s)</span>
          <span class="chevron" id="chev-arch-${annee}" style="margin-left:auto">▶</span>
        </div>
        <div id="arch-${annee}" style="display:none">${sejoursHtml}</div>
      </div>`;
  }).join('');

  return `
    <div class="section-title" onclick="toggleCat('archives-container','chev-archives')" style="cursor:pointer;user-select:none;color:var(--text-mid)">
      📦 Archives <span class="count">${allArchivedSejours.length}</span>
      <span class="chevron" id="chev-archives" style="margin-left:auto">▶</span>
    </div>
    <div id="archives-container" style="display:none">${anneesHtml}</div>`;
}

function getPersonDocs(id) { return allDocuments.filter(d => d.personne_id===id); }
function getUnlinked()     { return allDocuments.filter(d => !d.personne_id); }

function getStatus(id) {
  const docs = getPersonDocs(id);
  if (!docs.length) return 'empty';
  if (docs.find(d => d.type==='dossier_complet' && d.verified)) return 'complete';
  if (docs.find(d => d.type==='dossier_complet' && !d.verified)) return 'pending';
  if (docs.find(d=>d.type==='inscription') && docs.find(d=>d.type==='confidentiel')) return 'pending';
  return 'incomplete';
}

function getSejourPersonnes(sid) {
  return allSejoursPersonnes.filter(sp=>sp.sejour_id===sid).map(sp=>allPersonnes.find(p=>p.id===sp.personne_id)).filter(Boolean);
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : ''; }
function initials(prenom, nom) { return `${(prenom||'')[0]||''}${(nom||'')[0]||''}`.toUpperCase(); }

async function getSignedUrl(path) {
  const data = await api(`/storage/v1/object/sign/documents/${path}`, 'POST', { expiresIn: 60 });
  return data ? `${SUPABASE_URL}/storage/v1${data.signedURL}` : null;
}

async function openDoc(path, filename) {
  const url = await getSignedUrl(path);
  if (!url) { alert('Impossible de générer le lien'); return; }
  document.getElementById('pdfPreviewTitle').textContent = filename || path.split('/').pop();
  document.getElementById('pdfPreviewIframe').src = url;
  document.getElementById('pdfPreviewDownload').href = url;
  const overlay = document.getElementById('pdfPreviewOverlay');
  overlay.classList.add('show');
  overlay.style.display = 'flex';
}

function closePdfPreview(event) {
  if (event && event.target !== document.getElementById('pdfPreviewOverlay')) return;
  const overlay = document.getElementById('pdfPreviewOverlay');
  overlay.classList.remove('show');
  overlay.style.display = 'none';
  document.getElementById('pdfPreviewIframe').src = '';
}

function buildFilters() {
  const foyers = [...new Set(allPersonnes.map(p=>p.foyer).filter(Boolean))].sort();
  const selF = document.getElementById('filterFoyer');
  selF.innerHTML = '<option value="">Tous les foyers</option>';
  foyers.forEach(f => { const o=document.createElement('option'); o.value=f; o.textContent=f; selF.appendChild(o); });
  const selS = document.getElementById('filterSejour');
  selS.innerHTML = '<option value="">Tous les séjours</option><option value="none">Sans séjour</option>';
  allSejours.forEach(s => { const o=document.createElement('option'); o.value=s.id; o.textContent=`${s.nom} (${fmtDate(s.date_debut)})`; selS.appendChild(o); });
}

function buildStats() {
  const c  = allPersonnes.filter(p=>getStatus(p.id)==='complete').length;
  const pe = allPersonnes.filter(p=>getStatus(p.id)==='pending').length;
  const i  = allPersonnes.filter(p=>getStatus(p.id)==='incomplete').length;
  const v  = allPersonnes.filter(p=>getStatus(p.id)==='empty').length;
  const a  = getUnlinked().length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip ok"><span class="num">${c}</span> complets</div>
    <div class="stat-chip warn"><span class="num">${pe}</span> à vérifier</div>
    <div class="stat-chip warn"><span class="num">${i}</span> incomplets</div>
    <div class="stat-chip danger"><span class="num">${v}</span> sans doc</div>
    <div class="stat-chip warn"><span class="num">${a}</span> à classer</div>
    <div class="stat-chip"><span class="num">${allPersonnes.length}</span> vacanciers</div>`;
}

async function deleteDoc(docId, storagePath) {
  if (!confirm('Supprimer ce document définitivement ?')) return;
  await api(`/rest/v1/documents?id=eq.${docId}`, 'DELETE');
  await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${storagePath}`, { method:'DELETE', headers:{ apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${await getJWT()}` } });
  await init();
}

function detectTypeFromFilename(filename) {
  const f = (filename||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (f.includes('inscription')||f.includes('inscript')) return 'inscription';
  if (f.includes('confidentiel')||f.includes('confident')) return 'confidentiel';
  if (f.includes('ordonnance')||f.includes('ordo')) return 'ordonnance';
  return null;
}

async function classifyDoc(docId, type) {
  if (!type) return;
  await api(`/rest/v1/documents?id=eq.${docId}`, 'PATCH', { type, status:'linked' });
  const doc = allDocuments.find(d=>d.id===docId);
  if (doc) doc.type = type;
  buildStats(); renderAll();
}

async function linkDocument(docId, personneId, typeForce=null) {
  const p = allPersonnes.find(x=>x.id===personneId);
  const doc = allDocuments.find(d=>d.id===docId);
  const detectedType = typeForce || detectTypeFromFilename(doc?.filename||'');
  await api(`/rest/v1/documents?id=eq.${docId}`, 'PATCH', {
    personne_id: personneId,
    personne_nom: `${p.prenom} ${p.nom}`,
    status: 'linked',
    type: detectedType || doc?.type || 'autre'
  });
  if (doc) { doc.personne_id=personneId; doc.personne_nom=`${p.prenom} ${p.nom}`; doc.type=detectedType||doc.type; }
  renderAll();
}

async function confirmLink(docId) {
  const val = document.getElementById(`sel-${docId}`).value;
  if (!val) return alert('Choisis un vacancier.');
  const typeChoisi = document.getElementById(`type-${docId}`).value || null;
  await linkDocument(docId, val, typeChoisi);
}

async function validerDossier(personneId) {
  if (!confirm('Confirmer que le dossier est complet ?')) return;
  await api(`/rest/v1/documents?personne_id=eq.${personneId}`, 'PATCH', { verified:true });
  await init();
}

function openModal()  { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

async function saveSejour() {
  const nom=document.getElementById('sejourNom').value.trim(), debut=document.getElementById('sejourDebut').value, fin=document.getElementById('sejourFin').value, categorie=document.getElementById('sejourCategorie').value;
  if (!nom||!debut||!fin) return alert('Remplis tous les champs.');
  await api('/rest/v1/sejours','POST',{nom,date_debut:debut,date_fin:fin,categorie});
  closeModal(); await init();
}

async function addToSejour(sid,pid) { await api('/rest/v1/sejours_personnes','POST',{sejour_id:sid,personne_id:pid,confirmed:true}); await init(); }
async function removeFromSejour(sid,pid) { await api(`/rest/v1/sejours_personnes?sejour_id=eq.${sid}&personne_id=eq.${pid}`,'DELETE'); await init(); }
async function addPersonToSejour(sid) { const sel=document.getElementById(`add-sel-${sid}`); if(!sel.value) return; await addToSejour(sid,sel.value); }

async function archiverSejour(sejourId) {
  const sejour = allSejours.find(s=>s.id===sejourId);
  if (!confirm(`Archiver le séjour "${sejour.nom}" et tous ses documents ?`)) return;
  await api(`/rest/v1/sejours?id=eq.${sejourId}`,'PATCH',{archived:true});
  const pids = allSejoursPersonnes.filter(sp=>sp.sejour_id===sejourId).map(sp=>sp.personne_id);
  for (const pid of pids) await api(`/rest/v1/documents?personne_id=eq.${pid}&type=neq.confidentiel&type=neq.dossier_complet`,'PATCH',{archived:true});
  await init();
}

async function confirmSejour(spId) { await api(`/rest/v1/sejours_personnes?id=eq.${spId}`,'PATCH',{confirmed:true}); await init(); }
async function rejectSejour(spId)  { await api(`/rest/v1/sejours_personnes?id=eq.${spId}`,'DELETE'); await init(); }

function filterSearchSelect(docId, query) {
  const list = document.getElementById(`ss-list-${docId}`);
  const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  list.style.display = 'block';
  Array.from(list.children).forEach(item => { const name=(item.dataset.name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); item.style.display=name.includes(q)?'block':'none'; });
}
function selectPerson(docId,personneId,label) {
  document.getElementById(`sel-${docId}`).value=personneId;
  document.querySelector(`#ss-${docId} .search-select-input`).value=label;
  document.getElementById(`ss-list-${docId}`).style.display='none';
  document.getElementById(`type-${docId}`).style.display = 'inline-block';
  document.getElementById(`lier-${docId}`).style.display='inline-flex';
}
document.addEventListener('click', e => { if (!e.target.closest('.search-select')) document.querySelectorAll('.search-select-list').forEach(l=>l.style.display='none'); });

function toggleCard(uid) { document.getElementById(`docs-${uid}`)?.classList.toggle('open'); document.getElementById(`chev-${uid}`)?.classList.toggle('open'); }
function toggleSejour(uid) { document.getElementById(uid)?.classList.toggle('open'); document.getElementById(`schev-${uid}`)?.classList.toggle('open'); }
function toggleSejoursContainer() { const c=document.getElementById('sejours-container'),v=document.getElementById('sejours-chevron'); c.style.display=c.style.display==='none'?'block':'none'; v?.classList.toggle('open'); }
function toggleAClasser() { const c=document.getElementById('aclasser-container'),v=document.getElementById('aclasser-chevron'); c.style.display=c.style.display==='none'?'block':'none'; v?.classList.toggle('open'); }
function toggleCat(id,chevId) { const el=document.getElementById(id),ch=document.getElementById(chevId); if(el) el.style.display=el.style.display==='none'?'block':'none'; if(ch) ch.classList.toggle('open'); }

function buildPersonCard(p, sejourId=null) {
  const docs=getPersonDocs(p.id), status=getStatus(p.id);
  const personFiches=allFiches.filter(f=>f.personne_id===p.id);
  const hasFiche=personFiches.length>0;
  const lastFiche=personFiches[0];

  let badgesHtml='';
  if (status==='complete') badgesHtml=`<span class="badge badge-inscription">✅ Complet</span>`;
  else if (status==='pending') badgesHtml=`<span class="badge badge-pending">⏳ À vérifier</span>`;
  else badgesHtml=REQUIRED_TYPES.map(t=>{ const has=docs.find(d=>d.type===t); return `<span class="badge ${has?`badge-${t}`:'missing'}">${has?TYPE_LABELS[t]:TYPE_LABELS[t]+' ✗'}</span>`; }).join('');

  // Fiche formulaire badge
  if(hasFiche){
    badgesHtml+=`<span class="badge" style="background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc">📋 Fiche reçue</span>`;
  }

  const docRows=REQUIRED_TYPES.map(t=>{
    const typeDocs=docs.filter(d=>d.type===t);
    if (!typeDocs.length) return `<div class="doc-row"><span class="doc-type-pill missing">${TYPE_LABELS[t]}</span><span class="doc-missing">Document manquant</span></div>`;
    return typeDocs.map(doc=>`<div class="doc-row"><span class="doc-type-pill ${t}">${TYPE_LABELS[t]}</span><span class="doc-filename">${doc.filename}</span><span class="doc-date">${fmtDate(doc.email_date)}</span><div class="doc-actions"><button class="btn btn-info btn-sm" onclick="openDoc('${esc(doc.storage_path)}','${esc(doc.filename)}')">Voir</button><select class="link-select" onchange="classifyDoc('${doc.id}',this.value)" style="height:28px;font-size:11px"><option value="">Modifier…</option><option value="inscription" ${t==='inscription'?'selected':''}>📝 Inscription</option><option value="confidentiel" ${t==='confidentiel'?'selected':''}>🔒 Confidentiel</option><option value="dossier_complet" ${t==='dossier_complet'?'selected':''}>📁 Dossier complet</option><option value="ordonnance" ${t==='ordonnance'?'selected':''}>💊 Ordonnance</option><option value="divers" ${t==='divers'?'selected':''}>📎 Divers</option></select><button class="btn btn-danger btn-icon btn-sm" onclick="deleteDoc('${doc.id}','${esc(doc.storage_path)}')" title="Supprimer">🗑</button></div></div>`).join('');
  }).join('');

  const extraTypes=['ordonnance','divers','dossier_complet'];
  const extraRows=extraTypes.flatMap(t=>docs.filter(d=>d.type===t).map(doc=>`<div class="doc-row"><span class="doc-type-pill ${t==='dossier_complet'?'inscription':t}">${TYPE_LABELS[t]}</span><span class="doc-filename">${doc.filename}</span><span class="doc-date">${fmtDate(doc.email_date)}</span><div class="doc-actions"><button class="btn btn-info btn-sm" onclick="openDoc('${esc(doc.storage_path)}','${esc(doc.filename)}')">Voir</button><select class="link-select" onchange="classifyDoc('${doc.id}',this.value)" style="height:28px;font-size:11px"><option value="">Modifier…</option><option value="inscription" ${t==='inscription'?'selected':''}>📝 Inscription</option><option value="confidentiel" ${t==='confidentiel'?'selected':''}>🔒 Confidentiel</option><option value="dossier_complet" ${t==='dossier_complet'?'selected':''}>📁 Dossier complet</option><option value="ordonnance" ${t==='ordonnance'?'selected':''}>💊 Ordonnance</option><option value="divers" ${t==='divers'?'selected':''}>📎 Divers</option></select><button class="btn btn-danger btn-icon btn-sm" onclick="deleteDoc('${doc.id}','${esc(doc.storage_path)}')" title="Supprimer">🗑</button></div></div>`)).join('');

  const unclassified=docs.filter(d=>!REQUIRED_TYPES.includes(d.type)&&!extraTypes.includes(d.type));
  const unclassifiedRows=unclassified.map(doc=>`<div class="doc-row"><span class="doc-type-pill nonclasse">📎 Non classé</span><span class="doc-filename">${doc.filename}</span><span class="doc-date">${fmtDate(doc.email_date)}</span><div class="doc-actions"><button class="btn btn-info btn-sm" onclick="openDoc('${esc(doc.storage_path)}','${esc(doc.filename)}')">Voir</button><select class="link-select" onchange="classifyDoc('${doc.id}',this.value)" style="height:28px;font-size:11px"><option value="">Classer…</option><option value="inscription">📝 Inscription</option><option value="confidentiel">🔒 Confidentiel</option><option value="dossier_complet">📁 Dossier complet</option><option value="ordonnance">💊 Ordonnance</option><option value="divers">📎 Divers</option></select><button class="btn btn-danger btn-icon btn-sm" onclick="deleteDoc('${doc.id}','${esc(doc.storage_path)}')" title="Supprimer">🗑</button></div></div>`).join('');

  // Fiches formulaire rows
  const ficheRows = personFiches.map(f => {
    const typLabel = {weekend_theme:'Week-end thème',mini_sejour:'Mini séjour',weekend_ordinaire:'Week-end ordinaire',sejour:'Séjour long'}[f.type_sejour]||f.type_sejour;
    const sejNom = f.reponses_inscription?.sejour_choisi||'—';
    const modeLabel = f.mode_formulaire==='inscription'?'📝 Inscription seule':f.mode_formulaire==='confidentiel'?'🔒 Confidentielle seule':'📋 Complet';
    return `<div class="doc-row" style="background:#f0f9ff;border-left:3px solid #0ea5e9">
      <span class="doc-type-pill" style="background:#e0f2fe;color:#0369a1">📋 Fiche</span>
      <span class="doc-filename">${typLabel} — ${sejNom} <span style="font-size:10px;color:#0369a1">[${modeLabel}]</span></span>
      <span class="doc-date">${fmtDate(f.soumis_le)}</span>
      <div class="doc-actions">
        <button class="btn btn-info btn-sm" onclick="openFicheDetail('${f.id}')">Voir</button>
        <button class="btn btn-sm" onclick="unclasserFiche('${f.id}')" title="Remettre dans À classer" style="background:#fff9e6;color:#856404;border:1px solid #fcd34d">↩ Déclasser</button>
        <button class="btn btn-danger btn-icon btn-sm" onclick="deleteFiche('${f.id}')" title="Supprimer">🗑</button>
      </div>
    </div>`;
  }).join('');

  const btnValider=status==='pending'?`<div class="valider-block"><button class="btn btn-success btn-sm" onclick="validerDossier('${p.id}')">✅ Valider comme complet</button></div>`:'';
  const btnCompile = docs.length > 1 ? `<div class="valider-block"><button class="btn btn-info btn-sm" onclick="compilePDF('${p.id}','${p.prenom} ${p.nom}')">📄 Compiler tous les PDFs</button></div>` : '';
  const removeBtn=sejourId?`<button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="event.stopPropagation();removeFromSejour('${sejourId}','${p.id}')">Retirer</button>`:'';
  const uid=`${p.id}-${sejourId||'all'}`;

  const totalDocs = docs.length;
  const docsLabel = totalDocs > 0 ? `<span style="font-size:11px;color:var(--text-light);flex-shrink:0">${totalDocs} doc${totalDocs>1?'s':''}</span>` : '';

async function compilePDF(personneId, nom) {
  const docs = getPersonDocs(personneId);
  
  // Ordre : inscription → dossier_complet → confidentiel → ordonnance → divers → reste
  const ordre = ['inscription', 'dossier_complet', 'confidentiel', 'ordonnance', 'divers'];
  const sorted = [
    ...ordre.flatMap(t => docs.filter(d => d.type === t)),
    ...docs.filter(d => !ordre.includes(d.type))
  ];

  if (!sorted.length) return alert('Aucun document à compiler.');

  const { PDFDocument } = PDFLib;
  const merged = await PDFDocument.create();

  let erreurs = 0;
  for (const doc of sorted) {
    try {
      const url = await getSignedUrl(doc.storage_path);
      if (!url) { erreurs++; continue; }
      const bytes = await fetch(url).then(r => r.arrayBuffer());
      const pdf = await PDFDocument.load(bytes, { ignoreEncryption: true });
      const pages = await merged.copyPages(pdf, pdf.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    } catch(e) {
      console.warn(`Erreur sur ${doc.filename}:`, e);
      erreurs++;
    }
  }

const mergedBytes = await merged.save();
  const filename = `${nom.replace(/\s/g,'_')}_dossier_complet.pdf`;
  const timestamp = new Date().toISOString().replace(/[:.]/g,'-');
  const storagePath = `incoming/${timestamp}_${filename}`;

  // Upload dans Storage
  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${storagePath}`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${await getJWT()}`,
      'Content-Type': 'application/pdf'
    },
    body: mergedBytes
  });

  if (!uploadRes.ok) return alert('Erreur lors de l\'upload du dossier compilé.');

  // Insérer en base
  const p = allPersonnes.find(x => x.id === personneId);
  await api('/rest/v1/documents', 'POST', {
    personne_id:   personneId,
    personne_nom:  `${p.prenom} ${p.nom}`,
    type:          'dossier_complet',
    filename,
    storage_path:  storagePath,
    email_from:    'Compilation automatique',
    email_subject: 'Dossier compilé',
    email_date:    new Date().toISOString(),
    status:        'linked',
    manually_uploaded: true,
    annee:         new Date().getFullYear()
  });

  await init();
  if (erreurs > 0) alert(`✅ Dossier compilé ! (${erreurs} document(s) ignoré(s))`);
  else alert(`✅ Dossier compilé et ajouté au dossier de ${nom} !`);
}

async function imprimerSejour(sejourId) {
  const sejour = allSejours.find(s => s.id === sejourId);
  const personnes = getSejourPersonnes(sejourId);
  if (!personnes.length) return alert('Aucun vacancier dans ce séjour.');

  alert('Compilation en cours, merci de patienter…');

  const { PDFDocument } = PDFLib;
  const merged = await PDFDocument.create();
  const ordre = ['inscription', 'dossier_complet', 'confidentiel', 'ordonnance', 'divers'];
  let erreurs = 0;

  for (const p of personnes) {
    const docs = getPersonDocs(p.id);
    const sorted = [
      ...ordre.flatMap(t => docs.filter(d => d.type === t)),
      ...docs.filter(d => !ordre.includes(d.type))
    ];
    for (const doc of sorted) {
      try {
        const url = await getSignedUrl(doc.storage_path);
        if (!url) { erreurs++; continue; }
        const bytes = await fetch(url).then(r => r.arrayBuffer());
        const pdf = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const pages = await merged.copyPages(pdf, pdf.getPageIndices());
        pages.forEach(pg => merged.addPage(pg));
      } catch(e) {
        console.warn(`Erreur sur ${doc.filename}:`, e);
        erreurs++;
      }
    }
  }

  const mergedBytes = await merged.save();
  const blob = new Blob([mergedBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  // Ouvrir dans la preview pour impression directe
  document.getElementById('pdfPreviewTitle').textContent = `Séjour ${sejour?.nom || ''} — tous les documents`;
  document.getElementById('pdfPreviewIframe').src = url;
  document.getElementById('pdfPreviewDownload').href = url;
  document.getElementById('pdfPreviewDownload').download = `sejour_${(sejour?.nom||'').replace(/\s/g,'_')}.pdf`;
  const overlay = document.getElementById('pdfPreviewOverlay');
  overlay.classList.add('show');

  if (erreurs > 0) console.warn(`${erreurs} document(s) ignoré(s)`);
}

function getFilteredPersonnes() {
  const search=document.getElementById('searchInput').value.toLowerCase();
  const fStatus=document.getElementById('filterStatus').value;
  const fFoyer=document.getElementById('filterFoyer').value;
  const fSejour=document.getElementById('filterSejour').value;
  const fFiche=(document.getElementById('filterFiche')||{}).value||'';
  const sortBy=(document.getElementById('sortPersonnes')||{}).value||'alpha';

  let result = allPersonnes.filter(p=>{
    const name=`${p.prenom} ${p.nom}`.toLowerCase();
    if (search&&!name.includes(search)&&!(p.foyer||'').toLowerCase().includes(search)) return false;
    if (fStatus&&getStatus(p.id)!==fStatus) return false;
    if (fFoyer&&p.foyer!==fFoyer) return false;
    if (fSejour==='none'&&allSejoursPersonnes.some(sp=>sp.personne_id===p.id)) return false;
    if (fSejour&&fSejour!=='none'&&!allSejoursPersonnes.some(sp=>sp.sejour_id===fSejour&&sp.personne_id===p.id)) return false;
    // Filtre fiche reçue
    const personFiches = allFiches.filter(f=>f.personne_id===p.id);
    if (fFiche==='avec_fiche'&&personFiches.length===0) return false;
    if (fFiche==='sans_fiche'&&personFiches.length>0) return false;
    if (fFiche==='inscription'&&!personFiches.some(f=>f.mode_formulaire==='inscription')) return false;
    if (fFiche==='confidentiel'&&!personFiches.some(f=>f.mode_formulaire==='confidentiel')) return false;
    if (fFiche==='complet'&&!personFiches.some(f=>f.mode_formulaire==='complet'||!f.mode_formulaire)) return false;
    return true;
  });

  // Sort
  if (sortBy==='foyer'){
    result.sort((a,b)=>(a.foyer||'').localeCompare(b.foyer||'')||(a.nom||'').localeCompare(b.nom||''));
  } else {
    result.sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')||(a.prenom||'').localeCompare(b.prenom||''));
  }
  return result;
}

    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-light);flex-wrap:wrap">

  return `<div class="section-title" onclick="toggleFiches()" style="cursor:pointer;user-select:none">

}

function toggleFiches(){
  const c=document.getElementById('fiches-container');
  const v=document.getElementById('fiches-chevron');
  c.style.display=c.style.display==='none'?'block':'none';
  v?.classList.toggle('open');
}

async function unclasserFiche(ficheId){
  const f = allFiches.find(x=>x.id===ficheId);
  if(!f) return;
  const nom = `${f.prenom_saisi||''} ${f.nom_saisi||''}`.trim();
  if(!confirm(`Déclasser la fiche de ${nom} ?\n\nElle sera remise dans "Fiches à classer" et dissociée du vacancier.`)) return;
  try{
    const jwt = await getJWT();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches_inscription?id=eq.${encodeURIComponent(ficheId)}`,{
      method:'PATCH',
      headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${jwt}`,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({personne_id:null,statut_matching:'nouveau'})
    });
    if(!res.ok){alert('Erreur : '+(await res.text()));return;}
    await init();
  }catch(e){alert('Erreur : '+e.message);}
}

async function relier_fiche(ficheId, personneId){
  if(!personneId) return;
  const f = allFiches.find(x=>x.id===ficheId);
  const p = allPersonnes.find(x=>x.id===personneId);
  if(!p) return;
  const nomFiche = `${f?.prenom_saisi||''} ${f?.nom_saisi||''}`.trim();
  if(!confirm(`Relier la fiche de "${nomFiche}" à ${p.prenom} ${p.nom} — ${p.foyer||''} ?\n\nCette action peut être annulée via le bouton "↩ Déclasser".`)) return;
  try{
    const jwt = await getJWT();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches_inscription?id=eq.${encodeURIComponent(ficheId)}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${jwt}`,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({personne_id: personneId, statut_matching: 'exact'})
    });
    if(!res.ok){
      const err = await res.text();
      alert('Erreur liaison : '+err);
      return;
    }
    await init();
    alert('✅ Fiche liée à '+p.prenom+' '+p.nom+'.');
  }catch(e){
    alert('Erreur : '+e.message);
  }
}

async function deleteFiche(ficheId){
  if(!confirm('Supprimer cette fiche ? Cette action est irréversible.')) return;
  try{
    const jwt = await getJWT();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches_inscription?id=eq.${encodeURIComponent(ficheId)}`, {
      method: 'DELETE',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${jwt}`,
        Prefer: 'return=minimal'
      }
    });
    if(!res.ok){
      const err = await res.text();
      alert('Erreur suppression : '+err);
      return;
    }
    await init();
  }catch(e){
    alert('Erreur : '+e.message);
  }
}

function copierLien(mode){
  const input = document.getElementById('lien-'+mode);
  const btn = document.getElementById('copybtn-'+mode);
  if(!input) return;
  navigator.clipboard.writeText(input.value).then(()=>{
    btn.textContent = '✅ Copié !';
    setTimeout(()=>{ btn.textContent = '📋 Copier'; }, 2000);
  }).catch(()=>{
    input.select();
    document.execCommand('copy');
    btn.textContent = '✅ Copié !';
    setTimeout(()=>{ btn.textContent = '📋 Copier'; }, 2000);
  });
}
const SEJOURS_DEFAULT = {
  weekend_theme:{ sessions:["COUPLES du 27 au 29 Mars : 3 jours","PÂQUES du 4 au 6 Avril : 3 jours","PLAISIRS EN PERIGORD du 25 au 27 Avril : 3 jours","ENTRE COPINES du 25 au 27 avril : 3 jours","AUTOUR DES ANIMAUX du 1 au 3 Mai : 3 jours","Z'ANIMAUX du 27 au 29 Novembre : 3 jours","MUSIC AND CO du 27 au 29 Novembre : 3 jours"], prix:'390€ TTC' },
  mini_sejour:{ sessions:["TRESOR PERDU DU PERIGORD du 7 au 11 Mai","C'EST LA FETE ! du 7 au 11 Mai","GRAND MIXTE du 14 au 18 Mai","MELI MELO du 14 au 18 Mai","PECHE ET PETANQUE PARTY","ENTRE COPINES du 4 au 8 Novembre","GOURMANDISES D'AUTOMNE du 4 au 8 Novembre","DOUCEUR D'AUTOMNE du 11 au 15 Novembre"], prix:'590€ TTC' }
};

async function loadSejoursConfig(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/sejours_config?select=id,sessions,prix&id=in.(weekend_theme,mini_sejour)`,{
      headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'}
    });
    if(!res.ok) return SEJOURS_DEFAULT;
    const rows=await res.json();
    if(!rows||!rows.length) return SEJOURS_DEFAULT;
    const cfg=JSON.parse(JSON.stringify(SEJOURS_DEFAULT));
    rows.forEach(r=>{
      if(cfg[r.id]){
        cfg[r.id].sessions=Array.isArray(r.sessions)?r.sessions:JSON.parse(r.sessions||'[]');
        cfg[r.id].prix=r.prix||cfg[r.id].prix;
      }
    });
    return cfg;
  }catch(e){ return SEJOURS_DEFAULT; }
}

function addCfgRow(type){
  const container=document.getElementById('cfg-'+(type==='weekend_theme'?'wt':'ms')+'-rows');

}

async function saveSejoursConfig(){
  const wtRows=document.querySelectorAll('#cfg-wt-rows input[type=text]');
  const msRows=document.querySelectorAll('#cfg-ms-rows input[type=text]');
  const updates=[
    {id:'weekend_theme',sessions:[...wtRows].map(i=>i.value.trim()).filter(Boolean),prix:document.getElementById('cfg-wt-prix').value.trim()||'390€ TTC'},
    {id:'mini_sejour',sessions:[...msRows].map(i=>i.value.trim()).filter(Boolean),prix:document.getElementById('cfg-ms-prix').value.trim()||'590€ TTC'}
  ];
  try{
    const jwt=await getJWT();
    for(const row of updates){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/sejours_config?id=eq.${row.id}`,{
        method:'PATCH',
        headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${jwt}`,'Content-Type':'application/json',Prefer:'return=minimal'},
        body:JSON.stringify({sessions:row.sessions,prix:row.prix,updated_at:new Date().toISOString()})
      });
      if(!res.ok) throw new Error(await res.text());
    }
    document.getElementById('sejours-config-overlay').remove();
    alert('✅ Séjours mis à jour dans Supabase. Le formulaire utilisera ces nouvelles données immédiatement.');
  }catch(e){
    alert('Erreur lors de la sauvegarde : '+e.message);
  }
}

  document.getElementById('mainContent').innerHTML=html;
}
